{% extends "base.html" %}

{% block subheader %}
<div class="bg-gray-900 border-b border-gray-800">
  <div class="max-w-5xl mx-auto px-4 flex items-center gap-1 py-2 overflow-x-auto">
    <span class="text-gray-600 text-xs mr-2 shrink-0">Админ:</span>
    <a href="/admin/games/new" id="anav-new"
       class="admin-nav text-xs px-3 py-1.5 rounded-lg transition shrink-0 font-medium
              text-violet-300 bg-violet-900/30 hover:bg-violet-900/50">
      + Новая игра
    </a>
    <a href="/admin/players" id="anav-players"
       class="admin-nav text-xs px-3 py-1.5 rounded-lg transition shrink-0
              text-gray-400 hover:text-white hover:bg-gray-800">
      Игроки
    </a>
    <a href="/admin/locations" id="anav-locations"
       class="admin-nav text-xs px-3 py-1.5 rounded-lg transition shrink-0
              text-gray-400 hover:text-white hover:bg-gray-800">
      Локации
    </a>
    <a href="/admin" id="anav-dash"
       class="admin-nav text-xs px-3 py-1.5 rounded-lg transition shrink-0
              text-gray-500 hover:text-gray-300">
      ← Дашборд
    </a>
  </div>
</div>
<script>
  (function() {
    const p = window.location.pathname;
    const map = {
      '/admin/games/new': 'anav-new',
      '/admin/players':   'anav-players',
      '/admin/locations': 'anav-locations',
      '/admin':           'anav-dash',
    };
    // exact or prefix match
    for (const [route, id] of Object.entries(map)) {
      if (p === route || (route !== '/admin' && p.startsWith(route))) {
        const el = document.getElementById(id);
        if (el) {
          el.classList.add('!text-white', 'bg-gray-800');
          el.classList.remove('text-gray-400', 'text-gray-500', 'text-violet-300', 'bg-violet-900/30');
        }
      }
    }
  })();
</script>
{% endblock %}
