{% extends "base.html" %}
{% block title %}Игроки — Шляпа{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-8">
  <h1 class="text-2xl font-bold text-white">Игроки</h1>
  <a href="/admin" class="text-gray-400 hover:text-gray-200 text-sm transition">← Назад</a>
</div>

<div class="grid sm:grid-cols-2 gap-6">
  <!-- Add form -->
  <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
    <h2 class="text-lg font-semibold text-white mb-4">Добавить игрока</h2>
    <form method="post" action="/admin/players" class="flex flex-col gap-3">
      <div>
        <label class="block text-gray-400 text-sm mb-1">Имя *</label>
        <input type="text" name="name" required placeholder="Александр Петров"
          class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-gray-100
                 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-violet-500 text-sm">
      </div>
      <button type="submit"
        class="bg-violet-600 hover:bg-violet-700 text-white font-medium py-2 rounded-lg transition">
        Добавить
      </button>
    </form>
  </div>

  <!-- List -->
  <div>
    {% if not players %}
      <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8 text-center text-gray-500">
        Нет игроков
      </div>
    {% else %}
      <div class="flex flex-col gap-2 max-h-[480px] overflow-y-auto pr-1">
        {% for p in players %}
        <div class="bg-gray-900 border border-gray-800 rounded-xl px-4 py-2.5 flex items-center justify-between gap-3">
          <span class="text-white">{{ p.name }}</span>
          <form method="post" action="/admin/players/{{ p.id }}/delete"
                onsubmit="return confirm('Удалить «{{ p.name }}»?')">
            <button type="submit"
              class="text-red-500 hover:text-red-400 text-xs border border-red-900/50 hover:border-red-700 px-2.5 py-1 rounded-lg transition">
              Удалить
            </button>
          </form>
        </div>
        {% endfor %}
      </div>
    {% endif %}
  </div>
</div>
{% endblock %}
