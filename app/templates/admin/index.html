{% extends "base.html" %}
{% block title %}Админ — Шляпа{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-white mb-8">Панель управления</h1>

<div class="grid sm:grid-cols-3 gap-4 mb-10">
  <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 text-center">
    <div class="text-4xl font-bold text-violet-400 mb-1">{{ locations_count }}</div>
    <div class="text-gray-400 text-sm">Локаций</div>
    <a href="/admin/locations" class="mt-3 inline-block text-violet-400 hover:text-violet-300 text-xs transition">Управление →</a>
  </div>
  <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 text-center">
    <div class="text-4xl font-bold text-violet-400 mb-1">{{ players_count }}</div>
    <div class="text-gray-400 text-sm">Игроков</div>
    <a href="/admin/players" class="mt-3 inline-block text-violet-400 hover:text-violet-300 text-xs transition">Управление →</a>
  </div>
  <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 text-center">
    <div class="text-4xl font-bold text-violet-400 mb-1">{{ games_count }}</div>
    <div class="text-gray-400 text-sm">Игр всего</div>
    <a href="/games" class="mt-3 inline-block text-violet-400 hover:text-violet-300 text-xs transition">Смотреть →</a>
  </div>
</div>

<div class="flex flex-wrap gap-3">
  <a href="/admin/games/new"
    class="bg-violet-600 hover:bg-violet-700 text-white font-medium px-5 py-2.5 rounded-xl transition">
    + Новая игра
  </a>
  <a href="/admin/locations"
    class="bg-gray-800 hover:bg-gray-700 text-gray-200 font-medium px-5 py-2.5 rounded-xl transition">
    Локации
  </a>
  <a href="/admin/players"
    class="bg-gray-800 hover:bg-gray-700 text-gray-200 font-medium px-5 py-2.5 rounded-xl transition">
    Игроки
  </a>
</div>
{% endblock %}
