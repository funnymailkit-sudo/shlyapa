<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Шляпа{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            gold:   { DEFAULT: '#f59e0b', soft: '#fef3c7' },
            silver: { DEFAULT: '#9ca3af', soft: '#f3f4f6' },
            bronze: { DEFAULT: '#b45309', soft: '#fef9c3' },
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #111827; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }

    /* Glow utilities */
    .glow-gold   { box-shadow: 0 0 24px rgba(245,158,11,.18); }
    .glow-violet { box-shadow: 0 0 20px rgba(139,92,246,.15); }

    /* Nav active underline */
    .nav-link { position: relative; }
    .nav-link.active::after {
      content: '';
      position: absolute; bottom: -2px; left: 0; right: 0;
      height: 2px; background: #8b5cf6; border-radius: 1px;
    }

    /* Fade-in animation */
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px);} to { opacity:1; transform:translateY(0);} }
    .fade-up { animation: fadeUp .3s ease both; }

    /* Table row hover */
    .table-row { transition: background .15s; }
    .table-row:hover { background: rgba(55,65,81,.5); }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen antialiased">

  <!-- ── Top Nav ──────────────────────────────────────────────────────────── -->
  <nav class="sticky top-0 z-50 bg-gray-950/80 backdrop-blur border-b border-gray-800/70">
    <div class="max-w-5xl mx-auto px-4 flex items-center h-14 gap-1">

      <!-- Logo -->
      <a href="/" class="flex items-center gap-2 mr-4 group">
        <span class="text-xl">🎩</span>
        <span class="font-extrabold text-white tracking-tight group-hover:text-violet-300 transition">Шляпа</span>
      </a>

      <!-- Links -->
      <a href="/"     id="nav-home"  class="nav-link text-sm text-gray-400 hover:text-white transition px-3 py-1.5 rounded-lg hover:bg-gray-800">Таблица</a>
      <a href="/games" id="nav-games" class="nav-link text-sm text-gray-400 hover:text-white transition px-3 py-1.5 rounded-lg hover:bg-gray-800">Игры</a>

      <span class="flex-1"></span>

      <a href="/admin" id="nav-admin"
         class="text-xs text-gray-600 hover:text-gray-300 border border-gray-800 hover:border-gray-600 px-3 py-1.5 rounded-lg transition">
        Админ
      </a>
    </div>
  </nav>

  <!-- ── Subheader slot (admin fills this) ──────────────────────────────── -->
  {% block subheader %}{% endblock %}

  <!-- ── Content ─────────────────────────────────────────────────────────── -->
  <main class="max-w-5xl mx-auto px-4 py-8 fade-up">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Nav active state ────────────────────────────────────────────────── -->
  <script>
    const path = window.location.pathname;
    if (path === '/') document.getElementById('nav-home')?.classList.add('active','text-white');
    else if (path.startsWith('/games')) document.getElementById('nav-games')?.classList.add('active','text-white');
    else if (path.startsWith('/admin')) document.getElementById('nav-admin')?.classList.add('text-gray-200','!border-gray-600');
  </script>
</body>
</html>
