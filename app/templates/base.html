<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Шляпа{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: '#111827',
            card: '#1f2937',
            border: '#374151',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .medal-gold   { color: #f59e0b; }
    .medal-silver { color: #9ca3af; }
    .medal-bronze { color: #b45309; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <!-- Nav -->
  <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 flex items-center gap-6 h-14">
      <a href="/" class="text-violet-400 font-bold text-lg tracking-tight hover:text-violet-300 transition">🎩 Шляпа</a>
      <a href="/" class="text-gray-300 hover:text-white text-sm transition">Таблица</a>
      <a href="/games" class="text-gray-300 hover:text-white text-sm transition">Игры</a>
      <span class="flex-1"></span>
      <a href="/admin" class="text-gray-500 hover:text-gray-300 text-xs transition">Админ</a>
    </div>
  </nav>

  <!-- Content -->
  <main class="max-w-5xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
